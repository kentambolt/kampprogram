<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White rounded background. Looks like a clean tile on any tab. -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>

  <!-- Net (vertical line through the middle). Rounded caps + a stroke
       width that still rasterises cleanly at 16×16. -->
  <line x1="16" y1="5" x2="16" y2="27"
        stroke="#000000" stroke-width="2"
        stroke-linecap="round"/>

  <!-- Four players, 2v2, around the net. Positions tuned to sit
       comfortably inside the maskable safe zone (~12.8 from centre). -->
  <g fill="#000000">
    <circle cx="10" cy="11" r="3.5"/>
    <circle cx="10" cy="21" r="3.5"/>
    <circle cx="22" cy="11" r="3.5"/>
    <circle cx="22" cy="21" r="3.5"/>
  </g>
</svg>
