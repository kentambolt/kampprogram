<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kampprogram</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"/>

    <!-- iOS / iPadOS "Add to Home Screen" -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Kampprogram"/>

    <!-- Android / Chrome "Add to Home Screen" -->
    <link rel="manifest" href="site.webmanifest"/>
    <meta name="theme-color" content="#e85d04"/>

    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="app-title">Kampprogram</div>
        <div class="header-menu">
            <button class="ghost menu-toggle" id="menuToggleBtn" aria-label="Menu">☰</button>
            <div class="menu-backdrop" id="menuBackdrop"></div>
            <div class="menu-dropdown" id="menuDropdown">
                <button class="ghost menu-item" id="settingsBtn">⚙ Indstillinger</button>
                <button class="ghost menu-item" id="importExportBtn">⇅ Importér / eksportér</button>
                <button class="danger menu-item" id="resetAllBtn">✕ Nulstil</button>
            </div>
        </div>
    </header>

    <div class="grid">
        <div>

            <div id="mainPage">

                <div class="panel" id="playersPanel">
                    <div class="flex-row">
                        <h2 class="h-no-m">Spillere</h2>
                        <div class="actions">
                            <button class="secondary" id="newPlayerBtn">+ Opret</button>
                        </div>
                    </div>

                    <div class="collapsible-panel collapsed mt24" id="activePlayersPanel">
                        <button class="prefill-header collapsible-toggle" type="button" data-target="activePlayersPanel">
                            <span class="h-no-m" id="activePlayersTitle">Aktive spillere</span>
                            <span class="collapse-indicator">▾</span>
                        </button>
                        <div class="player-chip-list mt collapsible-content" id="playerRosterArea"></div>
                    </div>

                    <div class="collapsible-panel collapsed mt24" id="arrivalPanel">
                        <button class="prefill-header collapsible-toggle" type="button" data-target="arrivalPanel">
                            <span class="h-no-m" id="allPlayersTitle">Alle spillere</span>
                            <span class="collapse-indicator">▾</span>
                        </button>
                        <div id="playerManagerListArea" class="player-manager-list mt collapsible-content"></div>
                    </div>

                    <div class="collapsible-panel collapsed mt24" id="playerListsPanel">
                        <button class="prefill-header collapsible-toggle" type="button" data-target="playerListsPanel">
                            <span class="h-no-m">Spillerlister</span>
                            <span class="collapse-indicator">▾</span>
                        </button>

                        <div class="collapsible-content">
                            <div class="settings-row" style="margin-top: 0;">
                                <label for="presetPlayerList">Hent gemt spillerliste</label>
                                <div class="actions">
                                    <select id="presetPlayerList">
                                        <option value="">Vælg liste</option>
                                    </select>
                                    <button class="secondary" id="loadPresetPlayersBtn">↓ Hent spillere</button>
                                </div>
                            </div>

                            <div class="settings-row">
                                <label for="newPresetListName">Gem nuværende spillere som ny liste</label>
                                <div class="actions">
                                    <input id="newPresetListName" type="text" placeholder="Fx Torsdagsholdet"/>
                                    <button class="secondary" id="savePresetPlayersBtn">✓ Gem liste</button>
                                </div>
                            </div>

                            <div class="settings-row">
                                <label for="deletePresetPlayerList">Slet gemt spillerliste</label>
                                <div class="actions">
                                    <select id="deletePresetPlayerList">
                                        <option value="">Vælg liste</option>
                                    </select>
                                    <button class="danger" id="deletePresetPlayersBtn">✕ Slet liste</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="panel hidden" id="matchPanel">
                    <h2>Lav kampe</h2>

                    <div class="match-row">
                        <div class="court-count">
                            <label for="courtCount">Baner</label>
                            <input id="courtCount" type="number" min="1" value="2"/>
                            <button class="primary" id="generateBtn">▶ Generer</button>
                        </div>
                    </div>

                    <div class="prefill-panel collapsible-panel collapsed" id="prefillPanel">
                        <button class="prefill-header collapsible-toggle" id="prefillToggleBtn" type="button">
                            <h3 class="h-no-m">Præudfyld</h3>
                            <span class="collapse-indicator">▾</span>
                        </button>

                        <div class="collapsible-content">
                            <div class="prefill-actions">
                                <button class="ghost" id="clearPrefillBtn" type="button">✕ Nulstil</button>
                            </div>
                            <div id="prefillArea" class="prefill-area"></div>
                        </div>
                    </div>

                    <div class="prefill-panel collapsible-panel collapsed" id="resultPanel">
                        <button class="prefill-header collapsible-toggle" id="resultToggleBtn" type="button">
                            <h3 class="h-no-m">Seneste kamp</h3>
                            <span class="collapse-indicator">▾</span>
                        </button>
                        <div class="collapsible-content">
                            <div id="resultArea" class="subtle">Ingen kamp genereret endnu.</div>
                        </div>
                    </div>
                </div>

                <div class="panel hidden collapsible-panel collapsed" id="playerStatsPanel">
                    <button class="collapsible-toggle panel-toggle" type="button" data-target="playerStatsPanel">
                        <span>Spillerstatus</span>
                        <span class="collapse-indicator">▾</span>
                    </button>
                    <div class="collapsible-content">
                        <div id="playerStatsArea" class="subtle">Ingen data endnu.</div>
                    </div>
                </div>

                <div class="panel hidden collapsible-panel collapsed" id="historyPanel">
                    <button class="collapsible-toggle panel-toggle" type="button" data-target="historyPanel">
                        <span>Historik</span>
                        <span class="collapse-indicator">▾</span>
                    </button>

                    <div class="collapsible-content">
                        <div class="history-header">

                            <button class="ghost" id="undoBtn">↩ Fjern seneste</button>
                            <button class="danger" id="resetHistoryBtn">✕ Fjern alle</button>
                        </div>
                        <div id="historyArea" class="subtle">Ingen kampe endnu.</div>
                    </div>
                </div>

            </div>

            <div class="panel settings-panel standalone" id="settingsPanel">
                <div class="flex-row">
                    <h2 class="h-no-m">Indstillinger</h2>
                    <button class="ghost" id="closeSettingsBtn">✕ Luk</button>
                </div>

                <div class="settings-row">
                    <label>
                        <input id="useSkillLevels" type="checkbox" checked />
                        Brug færdighedsniveauer
                    </label>
                </div>

                <div class="settings-sub-row" id="hideSkillLevelsRow">
                    <label>
                        <input id="hideSkillLevels" type="checkbox" />
                        Skjul niveauer i appen (privat tilstand)
                    </label>
                </div>

                <div id="levelSettingsGroup">
                    <div class="settings-row">
                        <label>
                            <input id="weightTeamBalance" type="checkbox" checked />
                            Prioritér modstandere på samme niveau
                        </label>
                    </div>
                    <div class="settings-row">
                        <label>
                            <input id="weightPartnerBalance" type="checkbox" checked />
                            Prioritér partnere på samme niveau
                        </label>
                    </div>
                </div>

                <div class="settings-row">
                    <label>
                        <input id="penaltyRepeatTeammate" type="checkbox" checked />
                        Prioritér nye partnere
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input id="penaltyRepeatOpponent" type="checkbox" checked />
                        Prioritér nye modstandere
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input id="penaltyBench" type="checkbox" checked />
                        Prioritér kampe til spillere, der for nyligt har været på bænken
                    </label>
                </div>

                <div class="settings-row">
                    <div class="settings-label">Tilladte holdstørrelser:</div>
                    <div class="format-sizes-group" id="formatSizesGroup">
                        <label class="format-size-label"><input type="checkbox" id="format-1v1" checked /> 1v1</label>
                        <label class="format-size-label"><input type="checkbox" id="format-2v2" checked /> 2v2</label>
                        <label class="format-size-label"><input type="checkbox" id="format-3v3" /> 3v3</label>
                        <label class="format-size-label"><input type="checkbox" id="format-4v4" /> 4v4</label>
                        <label class="format-size-label"><input type="checkbox" id="format-5v5" /> 5v5</label>
                        <label class="format-size-label"><input type="checkbox" id="format-6v6" /> 6v6</label>
                        <label class="format-size-label"><input type="checkbox" id="format-7v7" /> 7v7</label>
                        <label class="format-size-label"><input type="checkbox" id="format-8v8" /> 8v8</label>
                        <label class="format-size-label"><input type="checkbox" id="format-9v9" /> 9v9</label>
                        <label class="format-size-label"><input type="checkbox" id="format-10v10" /> 10v10</label>
                        <label class="format-size-label"><input type="checkbox" id="format-11v11" /> 11v11</label>
                    </div>
                </div>

                <div class="settings-row">
                    <label>
                        <input id="maximizeCourts" type="checkbox" checked />
                        Brug flest mulige baner (ellers brug færreste mulige)
                    </label>
                </div>

                <div class="settings-row">
                    <label for="defaultCourtCount">Standard antal baner</label>
                    <input id="defaultCourtCount" type="number" min="1" value="2" style="width:5rem;"/>
                </div>
            </div>

            <div class="panel import-export-panel standalone" id="importExportPanel">
                <div class="flex-row">
                    <h2>Importér / eksportér</h2>
                    <button class="ghost" id="closeImportExportBtn">✕ Luk</button>
                </div>

                <div class="settings-row">
                    <label for="playerImportText">Indsæt spillerliste (navn,niveau)</label>
                    <textarea
                            id="playerImportText"
                            rows="10"
                            placeholder="Hans,3&#10;Anne,7&#10;Lotte,2&#10;Peter,4&#10;Mie,2"
                    ></textarea>
                </div>

                <div class="actions" style="margin-top: 12px;">
                    <button class="secondary" id="importPlayersBtn">↑ Importér spillere</button>
                    <button class="ghost" id="copyPlayersBtn">⎘ Kopiér nuværende spillerliste</button>
                </div>
            </div>

            <div class="panel new-player-panel standalone" id="newPlayerPanel">
                <div class="flex-row">
                    <h2 class="h-no-m">Opret spiller</h2>
                    <button class="ghost" id="closeNewPlayerBtn">✕ Luk</button>
                </div>

                <div class="player-manager-form">
                    <div class="w100">
                        <label for="newPlayerName">Navn</label>
                        <input id="newPlayerName" type="text" placeholder="Fx Frederik"/>
                    </div>
                    <div>
                        <label for="newPlayerLevel">Niveau</label>
                        <select id="newPlayerLevel">
                            <option value="1">1</option>
                            <option value="2" selected>2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                        </select>
                    </div>
                </div>
                <div>
                    <button class="secondary" id="addPlayerBtn">+ Tilføj</button>
                </div>
            </div>

        </div>
    </div>
</div>
<div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>
<div id="generateOverlay" class="generate-overlay" role="status" aria-label="Genererer kampe…">
    <div class="generate-overlay__spinner"></div>
    <div class="generate-overlay__text">Genererer kampe…</div>
</div>
<script src="script.js" lang="javascript"></script>
</body>
</html>
