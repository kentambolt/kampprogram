<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kampprogram</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="app-title">Kampprogram</div>
        <div class="header-menu">
            <button class="ghost menu-toggle" id="menuToggleBtn" aria-label="Menu">☰</button>
            <div class="menu-dropdown" id="menuDropdown">
                <button class="ghost menu-item" id="settingsBtn">Indstillinger</button>
                <button class="ghost menu-item" id="importExportBtn">Importér / eksportér</button>
                <button class="danger menu-item" id="resetAllBtn">Nulstil alt</button>
            </div>
        </div>
    </header>

    <div class="grid">
        <div>

            <div id="mainPage">

                <div class="panel" id="playersPanel">
                    <div class="flex-row">
                        <h2 class="h-no-m">Spillere</h2>
                        <div class="actions">
                            <button class="secondary" id="newPlayerBtn">Opret</button>
                        </div>
                    </div>

                    <div class="collapsible-panel collapsed mt24" id="activePlayersPanel">
                        <button class="prefill-header collapsible-toggle" type="button" data-target="activePlayersPanel">
                            <span class="h-no-m" id="activePlayersTitle">Aktive spillere</span>
                            <span class="collapse-indicator">▾</span>
                        </button>
                        <div class="player-chip-list mt collapsible-content" id="playerRosterArea"></div>
                    </div>

                    <div class="collapsible-panel collapsed mt24" id="arrivalPanel">
                        <button class="prefill-header collapsible-toggle" type="button" data-target="arrivalPanel">
                            <span class="h-no-m" id="allPlayersTitle">Alle spillere</span>
                            <span class="collapse-indicator">▾</span>
                        </button>
                        <div id="playerManagerListArea" class="player-manager-list mt collapsible-content"></div>
                    </div>

                </div>

                <div class="panel hidden" id="matchPanel">
                    <h2>Lav kampe</h2>

                    <div class="match-row">
                        <div class="court-count">
                            <label for="courtCount">Baner</label>
                            <input id="courtCount" type="number" min="1" value="2"/>
                            <button class="primary" id="generateBtn">Generer</button>
                        </div>
                    </div>

                    <div class="prefill-panel collapsible-panel collapsed" id="prefillPanel">
                        <button class="prefill-header collapsible-toggle" id="prefillToggleBtn" type="button">
                            <h3 class="h-no-m">Præudfyld</h3>
                            <span class="collapse-indicator">▾</span>
                        </button>

                        <div class="collapsible-content">
                            <div class="prefill-actions">
                                <button class="ghost" id="clearPrefillBtn" type="button">Nulstil</button>
                            </div>
                            <div id="prefillArea" class="prefill-area"></div>
                        </div>
                    </div>
                </div>

                <div class="panel" id="resultPanel">
                    <h2 class="h-margin">Seneste kamp</h2>
                    <div id="resultArea" class="subtle">Ingen kamp genereret endnu.</div>
                </div>

                <div class="panel hidden collapsible-panel collapsed" id="playerStatsPanel">
                    <button class="collapsible-toggle panel-toggle" type="button" data-target="playerStatsPanel">
                        <span>Spillerstatus</span>
                        <span class="collapse-indicator">▾</span>
                    </button>
                    <div class="collapsible-content">
                        <div id="playerStatsArea" class="subtle">Ingen data endnu.</div>
                    </div>
                </div>

                <div class="panel hidden collapsible-panel collapsed" id="historyPanel">
                    <button class="collapsible-toggle panel-toggle" type="button" data-target="historyPanel">
                        <span>Historik</span>
                        <span class="collapse-indicator">▾</span>
                    </button>

                    <div class="collapsible-content">
                        <div class="history-header">

                            <button class="ghost" id="undoBtn">Fjern seneste</button>
                            <button class="danger" id="resetHistoryBtn">Fjern alle</button>
                        </div>
                        <div id="historyArea" class="subtle">Ingen kampe endnu.</div>
                    </div>
                </div>

            </div>

            <div class="panel settings-panel standalone" id="settingsPanel">
                <div class="flex-row">
                    <h2 class="h-no-m">Indstillinger</h2>
                    <button class="ghost" id="closeSettingsBtn">Luk</button>
                </div>

                <div class="settings-row">
                    <input id="iterations" type="number" min="1" step="100" value="1000"/>
                    <label for="iterations">tilfældige kampprogrammer genereres hver gang, hvorfra bedste sammensætning vælges</label>
                </div>

                <div class="settings-row">
                    <label>
                        <input id="weightTeamBalance" type="checkbox" checked />
                        Prioritér modstandere på samme niveau
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input id="weightPartnerBalance" type="checkbox" checked />
                        Prioritér partnere på samme niveau
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input id="penaltyRepeatTeammate" type="checkbox" checked />
                        Prioritér nye partnere
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input id="penaltyRepeatOpponent" type="checkbox" checked />
                        Prioritér nye modstandere
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input id="penaltyBench" type="checkbox" checked />
                        Prioritér kampe til spillere, der for nyligt har været på bænken
                    </label>
                </div>
            </div>

            <div class="panel import-export-panel standalone" id="importExportPanel">
                <div class="flex-row">
                    <h2>Importér / eksportér</h2>
                    <button class="ghost" id="closeImportExportBtn">Luk</button>
                </div>

                <div class="settings-row">
                    <label for="presetPlayerList">Hent spillere fra prædefineret liste</label>
                    <div class="actions">
                        <select id="presetPlayerList">
                            <option value="">Vælg liste</option>
                            <option value="voksenfjer.txt">Voksenfjer</option>
                        </select>
                        <button class="secondary" id="loadPresetPlayersBtn">Hent spillere</button>
                    </div>
                </div>

                <div class="settings-row">
                    <label for="playerImportText">Indsæt spillerliste (navn,niveau[,præference])</label>
                    <textarea
                            id="playerImportText"
                            rows="10"
                            placeholder="Hans,3&#10;Anne,7,single&#10;Lotte,2&#10;Peter,4,double,1&#10;Mie,2,double"
                    ></textarea>
                </div>

                <div class="actions" style="margin-top: 12px;">
                    <button class="secondary" id="importPlayersBtn">Importér spillere</button>
                    <button class="ghost" id="copyPlayersBtn">Kopiér nuværende spillerliste</button>
                </div>
            </div>

            <div class="panel new-player-panel standalone" id="newPlayerPanel">
                <div class="flex-row">
                    <h2 class="h-no-m">Opret spiller</h2>
                    <button class="ghost" id="closeNewPlayerBtn">Luk</button>
                </div>

                <div class="player-manager-form">
                    <div class="w100">
                        <label for="newPlayerName">Navn</label>
                        <input id="newPlayerName" type="text" placeholder="Fx Frederik"/>
                    </div>
                    <div>
                        <label for="newPlayerLevel">Niveau</label>
                        <select id="newPlayerLevel">
                            <option value="1">1</option>
                            <option value="2" selected>2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                        </select>
                    </div>
                    <div>
                        <label for="newPlayerPreference">Præference</label>
                        <select id="newPlayerPreference"></select>
                    </div>
                </div>
                <div>
                    <button class="secondary" id="addPlayerBtn">Tilføj</button>
                </div>
            </div>

        </div>
    </div>
</div>
<div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>
<script src="script.js" lang="javascript"></script>
</body>
</html>
