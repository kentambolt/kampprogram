<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kampprogram</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #1f2937;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-2: #38bdf8;
            --danger: #f87171;
            --border: #334155;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
        }

        body, .container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .container {
            margin: 0 auto;
            padding: 24px;
            position: fixed;
            overflow: auto;
        }


        .container {
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }

        .mini-table td.center {
            text-align: center;
        }

        .mini-table th.center {
            text-align: center;
        }

        h1, h2 {
            margin-top: 0;
        }

        h3 {
            margin-top: 20px;
        }

        .subtle {
            color: var(--muted);
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .panel + .panel {
            margin-top: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .settings-panel label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: normal;
            min-height: 48px;
        }

        .settings-panel input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
        }

        input,
        button,
        select {
            font: inherit;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }

        .row-4 {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 11px 16px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.05s ease, opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.95;
        }

        button:active {
            transform: translateY(1px);
        }

        .primary {
            background: var(--accent);
            color: #062b12;
        }

        .secondary {
            background: var(--accent-2);
            color: #062235;
        }

        .danger {
            background: var(--danger);
            color: #3b0a0a;
        }

        .ghost {
            background: #334155;
            color: var(--text);
        }

        .result-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            background: rgba(31, 41, 55, 0.7);
            margin-bottom: 14px;
        }

        .court-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .vs-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
        }

        .team {
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }

        .team h4 {
            margin: 0 0 8px 0;
            color: #cbd5e1;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .player-line {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(148, 163, 184, 0.2);
        }

        .player-line:last-child {
            border-bottom: none;
        }

        .tag {
            display: inline-block;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.16);
            color: #bae6fd;
        }

        .bench-list, .history-list {
            margin: 0;
            padding-left: 18px;
            line-height: 1.6;
        }

        .warning {
            color: #fde68a;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.4);
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 12px;
        }

        .player-manager {
            display: grid;
            grid-template-columns: 1.1fr 0.45fr 0.8fr auto;
            gap: 10px;
            align-items: end;
            margin-bottom: 12px;
        }

        .player-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .player-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 7px 10px;
        }

        .level {
            color: var(--muted);
            font-size: 12px;
        }

        .player-chip button {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
        }

        .mini-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .mini-table th,
        .mini-table td {
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            padding: 8px 6px;
            text-align: left;
            vertical-align: top;
        }

        .mini-table th {
            color: var(--muted);
            font-weight: bold;
        }

        .settings-panel,
        .arrival-panel {
            display: none;
        }

        .settings-panel.open,
        .arrival-panel.open {
            display: block;
        }

        .arrival-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .arrival-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .arrival-item.empty {
            grid-column: 1 / -1;
            justify-content: flex-start;
            color: var(--muted);
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 980px) {
            .grid,
            .row-3,
            .row-4,
            .vs-grid,
            .player-manager,
            .arrival-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="grid">
        <div>
            <div class="panel">
                <h2>Spillere</h2>

                <div class="player-manager">
                    <div>
                        <label for="newPlayerName">Navn</label>
                        <input id="newPlayerName" type="text" placeholder="Fx Frederik"/>
                    </div>
                    <div>
                        <label for="newPlayerLevel">Niveau</label>
                        <input id="newPlayerLevel" type="number" min="1" max="3" value="2"/>
                    </div>
                    <div>
                        <button class="secondary" id="addPlayerBtn">Tilføj spiller</button>
                    </div>
                </div>

                <div class="flex-row">
                    <h3>Aktive spillere i dag</h3>
                    <div class="actions">
                        <button class="ghost" id="arrivalBtn">Meld ankomst</button>
                    </div>
                </div>

                <div class="player-chip-list" id="playerRosterArea"></div>
            </div>

            <div class="panel arrival-panel" id="arrivalPanel">
                <div class="flex-row">
                    <h2>Meld ankomst</h2>
                    <button class="ghost" id="closeArrivalBtn">Luk</button>
                </div>
                <p class="subtle">Her vises kun spillere, som findes i listen, men som ikke er aktive endnu.</p>
                <div class="arrival-list" id="arrivalListArea"></div>
            </div>

            <div class="panel">
                <h2>Lav kampe</h2>

                <div class="row-3">
                    <div>
                        <label for="courtCount">Antal baner</label>
                        <input id="courtCount" type="number" min="1" value="2"/>
                    </div>
                    <div>
                        <label for="iterations">Antal random forsøg</label>
                        <input id="iterations" type="number" min="1" step="100" value="1000"/>
                    </div>
                    <div>
                        <label for="seedInfo">Aktive spillere lige nu</label>
                        <input id="seedInfo" type="text" value="0" readonly/>
                    </div>
                </div>

                <div class="actions">
                    <button class="primary" id="generateBtn">Lav næste kamp</button>
                    <button class="ghost" id="settingsBtn">Indstillinger</button>
                    <button class="ghost" id="undoBtn">Fjern seneste kamp fra historik</button>
                    <button class="danger" id="resetHistoryBtn">Nulstil historik</button>
                </div>
            </div>

            <div class="panel settings-panel" id="settingsPanel">
                <h2>Score / straf-konfiguration</h2>
                <div class="row-4">
                    <div>
                        <label>
                            <input id="weightTeamBalance" type="checkbox" checked />
                            Prioritér modstander på samme niveau
                        </label>
                    </div>
                    <div>
                        <label>
                            <input id="weightPartnerBalance" type="checkbox" checked />
                            Prioritér partner på samme niveau
                        </label>
                    </div>
                    <div>
                        <label>
                            <input id="penaltyRepeatTeammateLast" type="checkbox" checked />
                            Prioritér ny partner i forhold til sidste kamp
                        </label>
                    </div>
                    <div>
                        <label>
                            <input id="penaltyRepeatTeammatePrev" type="checkbox" checked />
                            Prioritér ny partner i forhold til forrige kamp
                        </label>
                    </div>
                </div>

                <div class="row-4">
                    <div>
                        <label>
                            <input id="penaltyRepeatOpponentLast" type="checkbox" checked />
                            Prioritér ny modstander i forhold til sidste kamp
                        </label>
                    </div>
                    <div>
                        <label>
                            <input id="penaltyRepeatOpponentPrev" type="checkbox" checked />
                            Prioritér ny modstander i forhold til forrige kamp
                        </label>
                    </div>
                </div>

                <div class="row-4">
                    <div>
                        <label>
                            <input id="penaltyBenchLast" type="checkbox" checked />
                            Brug straf for samme spiller på bænken som sidst
                        </label>
                    </div>
                    <div>
                        <label>
                            <input id="penaltyBenchPrev" type="checkbox" checked />
                            Brug straf for samme spiller på bænken som forrige
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <div class="panel">
                <div id="resultArea">
                    <p class="subtle">Tryk på <strong>Lav næste kamp</strong> for at generere en opstilling.</p>
                </div>
            </div>

            <div class="panel">
                <h2>Status på spillere</h2>
                <div id="playerStatsArea" class="subtle">Ingen data endnu.</div>
            </div>

            <div class="panel">
                <h2>Historik</h2>
                <div id="historyArea" class="subtle">Ingen kampe endnu.</div>
            </div>
        </div>
    </div>
</div>

<script>
    const DEFAULT_PLAYERS = [
        {name: 'Esben', level: 3, active: false},
        {name: 'Palle', level: 3, active: false},
        {name: 'Ditte', level: 1, active: false},
        {name: 'Lene', level: 1, active: false},
        {name: 'Mette', level: 1, active: false},
        {name: 'Dishaan', level: 3, active: false},
        {name: 'Karina', level: 2, active: false},
        {name: 'Martin', level: 3, active: false},
        {name: 'Paw', level: 3, active: false},
        {name: 'Kent', level: 3, active: false},
        {name: 'Jonas', level: 3, active: false},
        {name: 'Mads', level: 2, active: false},
        {name: 'Mona', level: 2, active: false},
        {name: 'Peter', level: 2, active: false},
        {name: 'Louise', level: 2, active: false},
        {name: 'Thor', level: 2, active: false},
        {name: 'Ioana', level: 2, active: false},
        {name: 'Christoffer', level: 3, active: false},
        {name: 'Klaus', level: 3, active: false},
        {name: 'Varsha', level: 2, active: false},
        {name: 'Anders', level: 2, active: false},
        {name: 'Trine', level: 2, active: false},
        {name: 'Esra', level: 1, active: false},
        {name: 'Istahil', level: 1, active: false},
        {name: 'Katrine', level: 2, active: false},
        {name: 'Philip', level: 2, active: false},
        {name: 'Laura', level: 2, active: false},
        {name: 'Mark', level: 3, active: false},
    ];

    const FIXED_CONFIG = {
        teamBalanceWeight: 12,
        partnerBalanceWeight: 3,
        teammateLastPenalty: 10,
        teammatePrevPenalty: 6,
        opponentLastPenalty: 5,
        opponentPrevPenalty: 2.5,
        benchLastPenalty: 500,
        benchPrevPenalty: 120
    };

    const state = {
        roster: [],
        history: [],
        lastResult: null
    };

    const el = {
        playerRosterArea: document.getElementById('playerRosterArea'),
        playerStatsArea: document.getElementById('playerStatsArea'),
        arrivalListArea: document.getElementById('arrivalListArea'),
        arrivalPanel: document.getElementById('arrivalPanel'),
        arrivalBtn: document.getElementById('arrivalBtn'),
        closeArrivalBtn: document.getElementById('closeArrivalBtn'),
        newPlayerName: document.getElementById('newPlayerName'),
        newPlayerLevel: document.getElementById('newPlayerLevel'),
        addPlayerBtn: document.getElementById('addPlayerBtn'),
        courtCount: document.getElementById('courtCount'),
        iterations: document.getElementById('iterations'),
        seedInfo: document.getElementById('seedInfo'),
        weightTeamBalance: document.getElementById('weightTeamBalance'),
        weightPartnerBalance: document.getElementById('weightPartnerBalance'),
        penaltyRepeatTeammateLast: document.getElementById('penaltyRepeatTeammateLast'),
        penaltyRepeatTeammatePrev: document.getElementById('penaltyRepeatTeammatePrev'),
        penaltyRepeatOpponentLast: document.getElementById('penaltyRepeatOpponentLast'),
        penaltyRepeatOpponentPrev: document.getElementById('penaltyRepeatOpponentPrev'),
        penaltyBenchLast: document.getElementById('penaltyBenchLast'),
        penaltyBenchPrev: document.getElementById('penaltyBenchPrev'),
        settingsBtn: document.getElementById('settingsBtn'),
        settingsPanel: document.getElementById('settingsPanel'),
        generateBtn: document.getElementById('generateBtn'),
        resetHistoryBtn: document.getElementById('resetHistoryBtn'),
        undoBtn: document.getElementById('undoBtn'),
        resultArea: document.getElementById('resultArea'),
        historyArea: document.getElementById('historyArea'),
    };

    function clonePlayers(players) {
        return players.map(player => ({...player, active: Boolean(player.active)}));
    }

    function normalizeName(name) {
        return String(name || '').trim();
    }

    function loadDefaults() {
        state.roster = clonePlayers(DEFAULT_PLAYERS).map(player => ({
            ...player,
            active: false
        }));
        renderRoster();
        renderArrivalList();
        renderPlayerStats();
    }

    function getActivePlayers() {
        return state.roster.filter(player => player.active === true);
    }

    function getInactivePlayers() {
        return state.roster.filter(player => player.active !== true);
    }

    function getConfig() {
        return {
            teamBalanceWeight: el.weightTeamBalance.checked ? FIXED_CONFIG.teamBalanceWeight : 0,
            partnerBalanceWeight: el.weightPartnerBalance.checked ? FIXED_CONFIG.partnerBalanceWeight : 0,
            teammateLastPenalty: el.penaltyRepeatTeammateLast.checked ? FIXED_CONFIG.teammateLastPenalty : 0,
            teammatePrevPenalty: el.penaltyRepeatTeammatePrev.checked ? FIXED_CONFIG.teammatePrevPenalty : 0,
            opponentLastPenalty: el.penaltyRepeatOpponentLast.checked ? FIXED_CONFIG.opponentLastPenalty : 0,
            opponentPrevPenalty: el.penaltyRepeatOpponentPrev.checked ? FIXED_CONFIG.opponentPrevPenalty : 0,
            benchLastPenalty: el.penaltyBenchLast.checked ? FIXED_CONFIG.benchLastPenalty : 0,
            benchPrevPenalty: el.penaltyBenchPrev.checked ? FIXED_CONFIG.benchPrevPenalty : 0
        };
    }

    function shuffle(arr) {
        const copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function pairKey(a, b) {
        return [a, b].sort().join('::');
    }

    function buildRelationMaps(round) {
        const teammatePairs = new Set();
        const opponentPairs = new Set();

        for (const court of round.courts) {
            const [a1, a2] = court.teamA.players;
            const [b1, b2] = court.teamB.players;

            teammatePairs.add(pairKey(a1.name, a2.name));
            teammatePairs.add(pairKey(b1.name, b2.name));

            const opponents = [
                [a1.name, b1.name], [a1.name, b2.name],
                [a2.name, b1.name], [a2.name, b2.name]
            ];

            for (const [x, y] of opponents) {
                opponentPairs.add(pairKey(x, y));
            }
        }

        return {
            teammatePairs,
            opponentPairs,
            benched: new Set(round.benched.map(player => player.name))
        };
    }

    function createRandomRound(players, courtCount) {
        const shuffled = shuffle(players);

        const maxSlots = Math.min(courtCount * 4, shuffled.length);
        const usablePlayers = Math.floor(maxSlots / 4) * 4;

        const selected = shuffled.slice(0, usablePlayers);
        const benched = shuffled.slice(usablePlayers);
        const courts = [];

        for (let i = 0; i < selected.length; i += 4) {
            const group = selected.slice(i, i + 4);

            const arrangements = [
                {teamA: [group[0], group[1]], teamB: [group[2], group[3]]},
                {teamA: [group[0], group[2]], teamB: [group[1], group[3]]},
                {teamA: [group[0], group[3]], teamB: [group[1], group[2]]}
            ];

            const chosen = arrangements[Math.floor(Math.random() * arrangements.length)];

            courts.push({
                teamA: {
                    players: chosen.teamA,
                    totalLevel: chosen.teamA.reduce((sum, p) => sum + p.level, 0)
                },
                teamB: {
                    players: chosen.teamB,
                    totalLevel: chosen.teamB.reduce((sum, p) => sum + p.level, 0)
                }
            });
        }

        return {courts, benched};
    }

    function scoreBenchRotation(round, history, config) {
        let scoreDelta = 0;
        const lastRound = history[history.length - 1] || null;
        const prevRound = history[history.length - 2] || null;
        const lastBenched = new Set(lastRound ? lastRound.benched.map(player => player.name) : []);
        const prevBenched = new Set(prevRound ? prevRound.benched.map(player => player.name) : []);

        for (const player of round.benched) {
            if (lastBenched.has(player.name)) {
                const repeatPenalty = config.benchLastPenalty;
                scoreDelta -= repeatPenalty;
            }

            if (prevBenched.has(player.name)) {
                const repeatPenalty = config.benchPrevPenalty;
                scoreDelta -= repeatPenalty;
            }
        }
        return scoreDelta;
    }

    function scoreRound(round, history, config) {
        let score = 0;

        const lastRound = history[history.length - 1] || null;
        const prevRound = history[history.length - 2] || null;
        const lastMaps = lastRound ? buildRelationMaps(lastRound) : null;
        const prevMaps = prevRound ? buildRelationMaps(prevRound) : null;

        for (const court of round.courts) {
            const sumA = court.teamA.totalLevel;
            const sumB = court.teamB.totalLevel;
            const teamDiff = Math.abs(sumA - sumB);

            const partnerDiffA = Math.abs(court.teamA.players[0].level - court.teamA.players[1].level);
            const partnerDiffB = Math.abs(court.teamB.players[0].level - court.teamB.players[1].level);

            const teamPenalty = teamDiff * config.teamBalanceWeight;
            const partnerPenalty = (partnerDiffA + partnerDiffB) * config.partnerBalanceWeight;

            score -= teamPenalty;
            score -= partnerPenalty;

            const teammatePairs = [
                pairKey(court.teamA.players[0].name, court.teamA.players[1].name),
                pairKey(court.teamB.players[0].name, court.teamB.players[1].name)
            ];

            for (const key of teammatePairs) {
                if (lastMaps?.teammatePairs.has(key)) {
                    score -= config.teammateLastPenalty;
                }
                if (prevMaps?.teammatePairs.has(key)) {
                    score -= config.teammatePrevPenalty;
                }
            }

            const opponents = [
                [court.teamA.players[0].name, court.teamB.players[0].name],
                [court.teamA.players[0].name, court.teamB.players[1].name],
                [court.teamA.players[1].name, court.teamB.players[0].name],
                [court.teamA.players[1].name, court.teamB.players[1].name]
            ];

            for (const [x, y] of opponents) {
                const key = pairKey(x, y);
                if (lastMaps?.opponentPairs.has(key)) {
                    score -= config.opponentLastPenalty;
                }
                if (prevMaps?.opponentPairs.has(key)) {
                    score -= config.opponentPrevPenalty;
                }
            }
        }

        score += scoreBenchRotation(round, history, config);

        return score;
    }

    function findBestRound(players, courtCount, iterations, history, config) {
        let best = null;

        for (let i = 0; i < iterations; i++) {
            const round = createRandomRound(players, courtCount);
            const scored = scoreRound(round, history, config);
            const candidate = {...round, ...scored, iteration: i + 1};

            if (!best || candidate.score > best.score) {
                best = candidate;
            }
        }

        return best;
    }

    function getPlayerStats() {
        return state.roster.filter(player => player.active).map(player => {
            let played = 0;
            let benched = 0;
            let benchedLast = false;
            let benchedPrev = false;

            state.history.forEach((round, index) => {
                const onBench = round.benched.some(p => p.name === player.name);
                const onCourt = round.courts.some(court =>
                    [...court.teamA.players, ...court.teamB.players].some(p => p.name === player.name)
                );

                if (onBench) benched += 1;
                if (onCourt) played += 1;

                if (index === state.history.length - 1) benchedLast = onBench;
                if (index === state.history.length - 2) benchedPrev = onBench;
            });

            return {
                ...player,
                played,
                benched,
                benchedLast,
                benchedPrev
            };
        });
    }

    function renderRoster() {
        const activePlayers = getActivePlayers();
        el.seedInfo.value = String(activePlayers.length);

        if (activePlayers.length === 0) {
            el.playerRosterArea.innerHTML = '<div class="subtle">Ingen aktive spillere endnu.</div>';
            return;
        }

        el.playerRosterArea.innerHTML = activePlayers.map(player => {
            const index = state.roster.findIndex(p => p.name === player.name);
            return `
                <div class="player-chip">
                    <span><strong>${escapeHtml(player.name)}</strong> <span class="level">${player.level}</span></span>
                    <button class="danger" onclick="removePlayer(${index})">Fjern</button>
                </div>
            `;
        }).join('');
    }

    function renderArrivalList() {
        const inactivePlayers = getInactivePlayers();

        if (inactivePlayers.length === 0) {
            el.arrivalListArea.innerHTML = '<div class="arrival-item empty">Alle spillere er allerede aktive.</div>';
            return;
        }

        el.arrivalListArea.innerHTML = inactivePlayers.map(player => {
            const index = state.roster.findIndex(p => p.name === player.name);
            return `
                <div class="arrival-item">
                    <div>
                        <strong>${escapeHtml(player.name)} <span class="level">${player.level}</span></strong>
                    </div>
                    <button class="secondary" onclick="markArrived(${index})">Ankommet</button>
                </div>
            `;
        }).join('');
    }

    function renderPlayerStats() {
        const stats = getPlayerStats();

        if (stats.length === 0) {
            el.playerStatsArea.innerHTML = '<div class="subtle">Ingen data endnu.</div>';
            return;
        }

        el.playerStatsArea.innerHTML = `
            <table class="mini-table">
                <thead>
                    <tr>
                        <th>Spiller</th>
                        <th class="center">Niveau</th>
                        <th class="center">Spillet</th>
                        <th class="center">Siddet over</th>
                        <th class="center">Seneste bænk</th>
                    </tr>
                </thead>
                <tbody>
                    ${stats.map(player => `
                        <tr>
                            <td>${escapeHtml(player.name)}</td>
                            <td class="center">${player.level}</td>
                            <td class="center">${player.played}</td>
                            <td class="center">${player.benched}</td>
                            <td class="center">
                                ${player.benchedLast ? 'Sidst' : (player.benchedPrev ? 'Forrige' : ' ')}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function renderRound(result, iterations) {

        let html = '';

        if (result.courts.length === 0) {
            html += '<p class="warning">Der var ikke nok aktive spillere til at fylde en bane.</p>';
        }

        result.courts.forEach((court, index) => {
            html += `
                <div class="result-card">
                    <div class="court-title">
                        <span>Bane ${index + 1}</span>
                        <span class="tag">Samlet niveau: ${court.teamA.totalLevel} vs ${court.teamB.totalLevel}</span>
                    </div>
                    <div class="vs-grid">
                        <div class="team">
                            <h4>Hold A</h4>
                            ${court.teamA.players.map(player => `
                                <div class="player-line">
                                    <span>${escapeHtml(player.name)} <span class="level">${player.level}</span></span>
                                </div>
                            `).join('')}
                        </div>
                        <div><strong>VS</strong></div>
                        <div class="team">
                            <h4>Hold B</h4>
                            ${court.teamB.players.map(player => `
                                <div class="player-line">
                                    <span>${escapeHtml(player.name)} <span class="level">${player.level}</span></span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        });

        if (result.benched.length > 0) {
            html += `
                <div class="result-card">
                    <h3>Sidder over</h3>
                    <ul class="bench-list">
                        ${result.benched.map(p => `<li>${escapeHtml(p.name)} <span class="level">${p.level}</span></li>`).join('')}
                    </ul>
                </div>
            `;
        }

        el.resultArea.innerHTML = html;
    }

    function renderHistory() {
        if (state.history.length === 0) {
            el.historyArea.innerHTML = '<div class="subtle">Ingen kampe endnu.</div>';
            return;
        }

        const recent = state.history.slice(-6).reverse();
        el.historyArea.innerHTML = recent.map((round, idx) => {
            const roundNo = state.history.length - idx;
            return `
                <div class="result-card">
                    <div class="court-title">
                        <span>Kamp ${roundNo}</span>
                    </div>
                    <ul class="history-list">
                        ${round.courts.map((court, i) => `
                            <li>
                                Bane ${i + 1}: ${escapeHtml(court.teamA.players[0].name)} + ${escapeHtml(court.teamA.players[1].name)}
                                mod
                                ${escapeHtml(court.teamB.players[0].name)} + ${escapeHtml(court.teamB.players[1].name)}
                            </li>
                        `).join('')}
                        ${round.benched.length ? `<li>Sidder over: ${round.benched.map(p => `${escapeHtml(p.name)} <span class="level">${p.level}</span>`).join(', ')}</li>` : ''}
                    </ul>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function addPlayer() {
        const name = normalizeName(el.newPlayerName.value);
        const level = Number(el.newPlayerLevel.value);

        if (!name) {
            el.resultArea.innerHTML = '<div class="warning">Skriv et navn før du tilføjer spilleren.</div>';
            return;
        }

        if (![1, 2, 3].includes(level)) {
            el.resultArea.innerHTML = '<div class="warning">Niveau skal være 1, 2 eller 3.</div>';
            return;
        }

        if (state.roster.some(player => player.name.toLowerCase() === name.toLowerCase())) {
            el.resultArea.innerHTML = `<div class="warning">Spilleren ${escapeHtml(name)} findes allerede.</div>`;
            return;
        }

        state.roster.push({name, level, active: false});

        el.newPlayerName.value = '';
        el.newPlayerLevel.value = '2';

        renderRoster();
        renderArrivalList();
        renderPlayerStats();
    }

    function markArrived(index) {
        const player = state.roster[index];
        if (!player) return;

        player.active = true;
        renderRoster();
        renderArrivalList();
        renderPlayerStats();
    }

    function removePlayer(index) {
        const player = state.roster[index];
        if (!player) return;

        player.active = false;
        renderRoster();
        renderArrivalList();
        renderPlayerStats();
    }

    window.markArrived = markArrived;
    window.removePlayer = removePlayer;

    function generateRound() {
        try {
            const players = getActivePlayers();
            const courtCount = Math.max(1, Number(el.courtCount.value) || 1);
            const iterations = Math.max(1, Number(el.iterations.value) || 1000);
            const config = getConfig();

            if (players.length < 4) {
                throw new Error('Der skal være mindst 4 aktive spillere for at lave en kamp. Markér flere spillere som ankommet først.');
            }

            const best = findBestRound(players, courtCount, iterations, state.history, config);

            if (!best) {
                throw new Error('Kunne ikke finde en gyldig opstilling.');
            }

            state.lastResult = best;
            state.history.push(best);

            renderRound(best, iterations);
            renderHistory();
            renderPlayerStats();
        } catch (err) {
            el.resultArea.innerHTML = `<div class="warning">${escapeHtml(err.message)}</div>`;
        }
    }

    function resetHistory() {
        state.history = [];
        state.lastResult = null;
        renderHistory();
        renderPlayerStats();
        el.resultArea.innerHTML = '<p class="subtle">Historikken er nulstillet. Generér en ny kamp.</p>';
    }

    function undoLastRound() {
        if (state.history.length === 0) return;

        state.history.pop();
        state.lastResult = state.history[state.history.length - 1] || null;

        renderHistory();
        renderPlayerStats();
        el.resultArea.innerHTML = '<p class="subtle">Seneste kamp er fjernet fra historikken.</p>';
    }

    el.addPlayerBtn.addEventListener('click', addPlayer);

    el.arrivalBtn.addEventListener('click', () => {
        el.arrivalPanel.classList.toggle('open');
    });

    el.closeArrivalBtn.addEventListener('click', () => {
        el.arrivalPanel.classList.remove('open');
    });

    el.settingsBtn.addEventListener('click', () => {
        el.settingsPanel.classList.toggle('open');
    });

    el.generateBtn.addEventListener('click', generateRound);
    el.resetHistoryBtn.addEventListener('click', resetHistory);
    el.undoBtn.addEventListener('click', undoLastRound);

    loadDefaults();
    renderHistory();
</script>
</body>
</html>
